<%+header%>
<!-- 本地资源引用 -->
<script src="/luci-static/dashboard/tailwindcss.js"></script>
<script src="/luci-static/dashboard/lucide.js"></script>
<script src="/luci-static/dashboard/echarts.js"></script>

<div class="bg-[#f4f6f8] font-sans text-gray-800 p-4 min-h-[calc(100vh-120px)] rounded-xl">
    <!-- 主体内容区 -->
    <main class="max-w-[1400px] mx-auto flex flex-col gap-6">

        <!-- 第一排：网络接口状态 (左4) + 实时流量 (右8) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch flex-none">
            <div class="lg:col-span-4 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full">
                <div class="px-5 py-4 border-b border-gray-50 flex items-center space-x-2 flex-none">
                    <i data-lucide="globe" class="text-blue-500 w-[18px] h-[18px]"></i>
                    <h2 class="font-medium text-gray-700">网络接口状态</h2>
                </div>
                <div class="p-5 flex-1 flex flex-col justify-evenly">
                    <div class="flex justify-between items-center">
                        <div class="text-sm text-gray-500">WAN口 IP</div>
                        <div class="font-medium text-gray-800 flex items-center" id="wan-container">
                            <span id="wan-status-dot" class="w-2 h-2 rounded-full bg-green-500 mr-2 shadow-[0_0_8px_rgba(34,197,94,0.6)] hidden"></span>
                            <span id="wan-ip">-</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-sm text-gray-500">公网 IP</div>
                        <div class="font-medium text-gray-800 flex items-center">
                            <span id="public-ip">-</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-sm text-gray-500">局域网 IP</div>
                        <div class="font-medium text-gray-800" id="lan-ip">-</div>
                    </div>
                    <div class="flex justify-between items-start">
                        <div class="text-sm text-gray-500">DNS<span class="text-xs ml-1">(自动获取)</span></div>
                        <div class="font-medium text-gray-800 text-right text-sm" id="dns-servers">-</div>
                    </div>
                    <div class="flex justify-between items-center border-t border-gray-50 pt-4 mt-2">
                        <div class="text-sm text-gray-500 flex items-center">
                            <i data-lucide="activity" class="w-[14px] h-[14px] mr-1"></i> 已联网
                        </div>
                        <div class="font-medium text-blue-600 font-mono tracking-tight" id="network-uptime">-</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 bg-white rounded-xl shadow-sm border border-gray-100 p-5 relative overflow-hidden flex flex-col h-full">
                <div class="flex items-center justify-between mb-2 flex-none">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="activity" class="text-blue-500 w-[18px] h-[18px]"></i>
                        <h2 class="font-medium text-gray-700">实时网络流量</h2>
                    </div>
                    <div class="text-sm text-gray-500 flex space-x-6 bg-gray-50 px-4 py-2 rounded-lg border border-gray-100">
                        <div><span class="text-blue-500 mr-1">↓</span>总下载: <span id="total-down" class="text-blue-600 font-mono font-medium">0 B</span></div>
                        <div><span class="text-emerald-500 mr-1">↑</span>总上传: <span id="total-up" class="text-emerald-600 font-mono font-medium">0 B</span></div>
                    </div>
                </div>
                <div class="w-full flex-1 min-h-[260px]" id="traffic-line-chart"></div>
            </div>
        </div>

        <!-- 第二排：系统信息&按钮 (左4) + 设备&域名 (右8) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch flex-1 min-h-[380px]">
            <div class="lg:col-span-4 flex flex-col gap-6 h-full">
                <!-- 增加 min-h-[300px] 防止系统信息卡片被过度压缩 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex-1 flex flex-col min-h-[300px]">
                    <div class="px-5 py-4 border-b border-gray-50 flex items-center space-x-2 flex-none">
                        <i data-lucide="cpu" class="text-purple-500 w-[18px] h-[18px]"></i>
                        <h2 class="font-medium text-gray-700">系统信息</h2>
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center text-sm mb-4">
                                <span class="text-gray-500">设备型号</span>
                                <span class="font-medium truncate max-w-[200px] text-right" id="sys-model">-</span>
                            </div>

                            <div class="pt-1 mb-4">
                                <div class="flex justify-between text-xs text-gray-500 mb-1.5">
                                    <span>CPU 使用率</span>
                                    <span id="cpu-text" class="font-medium text-gray-800">0%</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-1.5">
                                    <div id="cpu-bar" class="bg-purple-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <div class="flex justify-between text-xs text-gray-500 mb-1.5">
                                    <span>CPU 温度</span>
                                    <span id="cpu-temp" class="font-medium text-orange-500">-</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-1.5">
                                    <div id="temp-bar" class="bg-orange-400 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="flex justify-between text-xs text-gray-500 mb-1.5">
                                    <span>内存使用率</span>
                                    <span id="mem-text" class="font-medium text-gray-800">0%</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-1.5">
                                    <div id="mem-bar" class="h-1.5 rounded-full transition-all duration-500 bg-green-500" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>

                        <div class="border-t border-gray-50 pt-4 space-y-3 mt-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500">固件版本</span>
                                <span class="font-medium text-gray-800 text-xs text-right" id="sys-firmware">-</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500">内核版本</span>
                                <span class="font-medium text-gray-800 text-xs text-right" id="sys-kernel">-</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500 flex items-center"><i data-lucide="clock" class="w-[14px] h-[14px] mr-1"></i> 已启动</span>
                                <span class="font-medium text-gray-800 font-mono tracking-tight" id="sys-uptime">-</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500 flex items-center"><i data-lucide="calendar" class="w-[14px] h-[14px] mr-1"></i> 系统时间</span>
                                <span class="font-medium text-blue-600 font-mono tracking-tight" id="sys-time">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 增加 shrink-0 和 min-h-[88px] 锁死按钮容器高度，解决挤压问题 -->
                <div class="grid grid-cols-3 gap-3 flex-none shrink-0 min-h-[88px]">
                    <button onclick="window.location.href='/cgi-bin/luci/admin/system/admin'" class="bg-white flex flex-col items-center justify-center p-4 rounded-xl shadow-sm border border-gray-100 hover:border-blue-200 hover:text-blue-600 transition-all text-gray-600 w-full h-full">
                        <div class="mb-2"><i data-lucide="key" class="w-5 h-5"></i></div>
                        <span class="text-xs font-medium">修改密码</span>
                    </button>
                    <button onclick="window.location.href='/cgi-bin/luci/admin/system'" class="bg-white flex flex-col items-center justify-center p-4 rounded-xl shadow-sm border border-gray-100 hover:border-blue-200 hover:text-blue-600 transition-all text-gray-600 w-full h-full">
                        <div class="mb-2"><i data-lucide="settings" class="w-5 h-5"></i></div>
                        <span class="text-xs font-medium">系统设置</span>
                    </button>
                    <button id="btn-samba" class="bg-white flex flex-col items-center justify-center p-4 rounded-xl shadow-sm border border-gray-100 hover:border-blue-200 hover:text-blue-600 transition-all text-gray-600 w-full h-full">
                        <div class="mb-2"><i data-lucide="folder-search" class="w-5 h-5"></i></div>
                        <span class="text-xs font-medium">文件共享</span>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full min-h-[380px]">
                    <div class="px-5 py-4 border-b border-gray-50 flex items-center justify-between flex-none">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="users" class="w-[18px] h-[18px] text-blue-500"></i>
                            <h2 class="font-medium text-gray-700">联网设备</h2>
                        </div>
                        <span class="text-xs bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full font-medium">在线 <span id="active-device-count">0</span> 台</span>
                    </div>
                    <div class="p-2 flex-1 overflow-y-auto relative" id="devices-list">
                        <!-- 动态加载设备列表 -->
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full min-h-[380px]">
                    <div class="px-5 py-4 border-b border-gray-50 flex items-center justify-between flex-none">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="link" class="w-[18px] h-[18px] text-indigo-500"></i>
                            <h2 class="font-medium text-gray-700 flex items-center" id="domains-title">活跃域名统计</h2>
                        </div>
                        <div class="flex bg-gray-100 p-1 rounded-lg">
                            <button id="btn-view-top" onclick="switchDomainView('top')" class="px-3 py-1 text-xs font-medium rounded-md bg-white shadow-sm text-blue-600 transition-all">统计</button>
                            <button id="btn-view-recent" onclick="switchDomainView('recent')" class="px-3 py-1 text-xs font-medium rounded-md text-gray-500 hover:text-gray-700 transition-all">实时</button>
                        </div>
                    </div>
                    <div class="p-2 flex-1 overflow-y-auto relative" id="domains-list">
                         <!-- 动态加载域名或IP列表 -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();
        const API_BASE = '<%=url("admin/dashboard/api")%>';

        // 模拟数据 (本地调试用)
        let mockTx = 1024 * 1024 * 50;
        let mockRx = 1024 * 1024 * 300;
        const getMockData = (endpoint) => {
            switch(endpoint) {
                case 'netinfo': return { wanStatus: 'up', wanIp: '100.64.12.34', lanIp: '192.168.100.1', dns: ['202.103.24.68', '202.103.44.150'], network_uptime_raw: 445800 };
                case 'sysinfo': return { model: 'Router-Mock (Offline Mode)', firmware: 'OpenWrt 23.05', kernel: '6.x', temp: 40, systime_raw: Math.floor(Date.now() / 1000), uptime_raw: 84942, cpuUsage: 3, memUsage: 12, hasSamba4: true };
                case 'traffic': mockTx += Math.floor(Math.random() * 2000000); mockRx += Math.floor(Math.random() * 15000000); return { tx_bytes: mockTx, rx_bytes: mockRx };
                case 'devices': return [{ mac: 'AA:BB:CC:DD:EE:FF', ip: '192.168.100.101', name: 'iPhone-Test', type: 'mobile', active: true }];
                case 'domains': return { source: 'mock', top: [{domain:'apple.com', count:100}], recent: [{domain:'google.com', count:5}] };
                default: return null;
            }
        };

        async function apiRequest(endpoint) {
            const hostname = window.location.hostname || '';
            const isLocalHtml = window.location.protocol === 'file:' || hostname === 'localhost' || hostname === '';
            if (isLocalHtml && !window.location.pathname.includes('/admin/')) {
                return getMockData(endpoint);
            }
            try {
                const res = await fetch(`${API_BASE}/${endpoint}`, { credentials: 'same-origin', headers: { 'Accept': 'application/json' } });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error(`[API Error] ${endpoint}:`, e.message);
                return null;
            }
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 B';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function formatUptime(seconds) {
            if (!seconds || seconds <= 0) return '-';
            const d = Math.floor(seconds / 86400), h = Math.floor((seconds % 86400) / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.floor(seconds % 60);
            return `${d > 0 ? d + '天 ' : ''}${h}小时 ${m}分 ${s}秒`;
        }

        function formatSysTime(unixSeconds) {
            const d = new Date(unixSeconds * 1000);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }

        let sysUptimeGlobal = 0, netUptimeGlobal = 0, sysTimeGlobal = 0;
        setInterval(() => {
            if (sysUptimeGlobal > 0) document.getElementById('sys-uptime').innerText = formatUptime(++sysUptimeGlobal);
            if (netUptimeGlobal > 0) document.getElementById('network-uptime').innerText = formatUptime(++netUptimeGlobal);
            if (sysTimeGlobal > 0) document.getElementById('sys-time').innerText = formatSysTime(++sysTimeGlobal);
        }, 1000);

        async function loadPublicIp() {
            const publicIpEl = document.getElementById('public-ip');
            publicIpEl.innerHTML = `<span class="flex items-center text-gray-400 text-xs"><i data-lucide="loader-2" class="w-3 h-3 animate-spin mr-1"></i> 获取中...</span>`;
            lucide.createIcons();
            try {
                const res = await fetch('https://ipleak.net/json/');
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                publicIpEl.innerHTML = `${data.ip}${data.country_name ? `<span class="text-xs text-gray-400 ml-1 font-normal">(${data.country_name})</span>` : ''}`;
            } catch (e) {
                publicIpEl.innerHTML = `<span class="text-red-400 text-xs">获取失败</span>`;
            }
        }

        async function loadStaticInfo() {
            const netInfo = await apiRequest('netinfo');
            if (netInfo) {
                document.getElementById('wan-ip').innerText = netInfo.wanIp;
                document.getElementById('lan-ip').innerText = netInfo.lanIp;
                document.getElementById('dns-servers').innerHTML = netInfo.dns && netInfo.dns.length > 0 ? netInfo.dns.join('<br>') : '-';
                netUptimeGlobal = netInfo.network_uptime_raw;
                if(netInfo.wanStatus === 'up') document.getElementById('wan-status-dot').classList.remove('hidden');
            }

            const sysInfo = await apiRequest('sysinfo');
            if (sysInfo) {
                document.getElementById('sys-model').innerText = sysInfo.model;
                document.getElementById('sys-firmware').innerText = sysInfo.firmware;
                document.getElementById('sys-kernel').innerText = sysInfo.kernel;
                sysUptimeGlobal = sysInfo.uptime_raw;
                sysTimeGlobal = sysInfo.systime_raw;
                updateCpuMem(sysInfo);
                const btnSamba = document.getElementById('btn-samba');
                btnSamba.onclick = () => {
                    window.location.href = sysInfo.hasSamba4 ? '/cgi-bin/luci/admin/services/samba4' : '/cgi-bin/luci/admin/services/smbuser';
                };
            }
        }

        function updateCpuMem(sysInfo) {
            document.getElementById('cpu-text').innerText = sysInfo.cpuUsage + '%';
            document.getElementById('cpu-bar').style.width = sysInfo.cpuUsage + '%';
            const tempVal = sysInfo.temp > 0 ? sysInfo.temp : 0;
            document.getElementById('cpu-temp').innerText = tempVal > 0 ? tempVal + '℃' : '-';
            const tempBar = document.getElementById('temp-bar');
            tempBar.style.width = Math.min(tempVal, 100) + '%';
            tempBar.className = `h-1.5 rounded-full transition-all duration-500 ${tempVal > 80 ? 'bg-red-500' : (tempVal > 60 ? 'bg-orange-500' : 'bg-green-500')}`;
            document.getElementById('mem-text').innerText = sysInfo.memUsage + '%';
            const memBar = document.getElementById('mem-bar');
            memBar.style.width = sysInfo.memUsage + '%';
            memBar.className = `h-1.5 rounded-full transition-all duration-500 ${sysInfo.memUsage > 80 ? 'bg-red-500' : 'bg-green-500'}`;
        }

        async function loadDevices() {
            const devices = await apiRequest('devices');
            if (!devices) return;
            document.getElementById('active-device-count').innerText = devices.filter(d => d.active).length;
            const html = devices.map(dev => `
                <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg transition-colors">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 rounded-lg ${dev.active ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-400'}">
                            <i data-lucide="${dev.type === 'mobile' ? 'smartphone' : 'laptop'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="text-sm font-medium ${dev.active ? 'text-gray-800' : 'text-gray-400'}">${dev.name || '未知设备'}</div>
                            <div class="text-xs text-gray-400 font-mono mt-0.5">${dev.ip}</div>
                        </div>
                    </div>
                    <div>
                        ${dev.active 
                            ? `<span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>`
                            : `<span class="h-2 w-2 rounded-full bg-gray-300 block"></span>`
                        }
                    </div>
                </div>
            `).join('');
            document.getElementById('devices-list').innerHTML = html;
            lucide.createIcons();
        }

        let currentDomainView = 'top';
        let latestDomainsData = { top: [], recent: [], source: 'none' };

        function switchDomainView(view) {
            currentDomainView = view;
            const btnTop = document.getElementById('btn-view-top');
            const btnRecent = document.getElementById('btn-view-recent');
            if (view === 'top') {
                btnTop.className = 'px-3 py-1 text-xs font-medium rounded-md bg-white shadow-sm text-blue-600 transition-all';
                btnRecent.className = 'px-3 py-1 text-xs font-medium rounded-md text-gray-500 hover:text-gray-700 transition-all';
            } else {
                btnRecent.className = 'px-3 py-1 text-xs font-medium rounded-md bg-white shadow-sm text-blue-600 transition-all';
                btnTop.className = 'px-3 py-1 text-xs font-medium rounded-md text-gray-500 hover:text-gray-700 transition-all';
            }
            renderDomainsList();
        }

        async function loadDomains() {
            const res = await apiRequest('domains');
            if (!res) return;
            latestDomainsData = res;
            renderDomainsList();
        }

        function renderDomainsList() {
            const { source, top, recent } = latestDomainsData;
            const domains = currentDomainView === 'top' ? top : recent;
            const titleEl = document.getElementById('domains-title');
            let sourceTag = source !== 'none' ? `<span class="ml-2 text-[10px] bg-${source==='openclash'?'purple':'blue'}-100 text-${source==='openclash'?'purple':'blue'}-700 px-2 py-0.5 rounded border border-${source==='openclash'?'purple':'blue'}-200 uppercase font-bold">${source}</span>` : '';
            titleEl.innerHTML = (currentDomainView === 'top' ? '统计排行' : '实时解析') + sourceTag;
            
            if (!domains || domains.length === 0) {
                document.getElementById('domains-list').innerHTML = `<div class="p-10 text-center text-gray-400">无记录</div>`;
                return;
            }

            const maxCount = top && top.length > 0 ? top[0].count : 1;
            const html = domains.map((item, idx) => `
                <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg group">
                    <div class="flex items-center space-x-3 truncate">
                        <div class="w-6 text-center text-sm ${currentDomainView === 'recent' ? 'text-blue-500 animate-pulse font-bold' : 'text-gray-400 font-medium'}">
                            ${currentDomainView === 'recent' ? '•' : (idx + 1)}
                        </div>
                        <div class="text-sm text-gray-700 truncate font-mono">${item.domain}</div>
                    </div>
                    <div class="flex items-center space-x-2 w-1/3 justify-end">
                        <span class="text-xs text-gray-500 font-mono">${item.count}次</span>
                        <div class="w-12 h-1 bg-gray-100 rounded-full overflow-hidden hidden sm:block">
                            <div class="bg-blue-400 h-full transition-all duration-700" style="width: ${Math.min((item.count / maxCount) * 100, 100)}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('domains-list').innerHTML = html;
        }

        const chartLine = echarts.init(document.getElementById('traffic-line-chart'));
        const lineOption = {
            tooltip: { trigger: 'axis', backgroundColor: 'rgba(255, 255, 255, 0.9)' },
            legend: { data: ['下载', '上传'], icon: 'circle', top: 0 },
            grid: { left: '2%', right: '3%', bottom: '2%', top: '15%', containLabel: true },
            xAxis: { type: 'category', boundaryGap: false, data: [] },
            yAxis: { type: 'value', axisLabel: { formatter: (val) => formatBytes(val) + '/s' } },
            series: [
                { name: '下载', type: 'line', smooth: true, itemStyle: { color: '#3b82f6' }, areaStyle: { color: 'rgba(59, 130, 246, 0.1)' }, data: [] },
                { name: '上传', type: 'line', smooth: true, itemStyle: { color: '#10b981' }, areaStyle: { color: 'rgba(16, 185, 129, 0.1)' }, data: [] }
            ]
        };
        chartLine.setOption(lineOption);
        window.addEventListener('resize', () => chartLine.resize());

        const MAX_POINTS = 30;
        let timeData = [], downData = [], upData = [];
        let prevTx = 0, prevRx = 0, prevTime = 0;

        async function refreshTraffic() {
            const traffic = await apiRequest('traffic');
            if (traffic) {
                const now = Date.now();
                if (prevTime !== 0) {
                    const timeDiff = (now - prevTime) / 1000;
                    const upSpeed = Math.max(0, (traffic.tx_bytes - prevTx) / timeDiff);
                    const downSpeed = Math.max(0, (traffic.rx_bytes - prevRx) / timeDiff);
                    const d = new Date();
                    const timeStr = [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => v.toString().padStart(2, '0')).join(':');
                    timeData.push(timeStr); downData.push(downSpeed); upData.push(upSpeed);
                    if (timeData.length > MAX_POINTS) { timeData.shift(); downData.shift(); upData.shift(); }
                    chartLine.setOption({ xAxis: { data: timeData }, series: [{ data: downData }, { data: upData }] });
                }
                document.getElementById('total-up').innerText = formatBytes(traffic.tx_bytes);
                document.getElementById('total-down').innerText = formatBytes(traffic.rx_bytes);
                prevTx = traffic.tx_bytes; prevRx = traffic.rx_bytes; prevTime = now;
            }
            const sys = await apiRequest('sysinfo');
            if (sys) updateCpuMem(sys);
        }

        loadStaticInfo();
        loadPublicIp();
        loadDevices();
        loadDomains();
        refreshTraffic();
        setInterval(refreshTraffic, 3000);
        setInterval(loadDomains, 5000);
    </script>
</div>
<%+footer%>
