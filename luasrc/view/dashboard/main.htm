<%+header%>
<link rel="stylesheet" href="/luci-static/dashboard/dashboard.css">

<div class="dashboard">
    <header>
        <div class="brand">
            <h1><%=_("Dashboard")%></h1>
        </div>
        <div class="sys-quick">
            <span>CPU: <b id="cpu-val">--</b></span>
            <span>RAM: <b id="mem-val">--</b></span>
        </div>
    </header>

    <div class="gauge-grid">
        <!-- Downstream Gauge -->
        <div class="gauge-box" id="gauge-down">
            <svg class="gauge-svg" width="280" height="280" viewBox="0 0 280 280">
                <circle class="gauge-track" cx="140" cy="140" r="120"></circle>
                <circle class="gauge-glow" cx="140" cy="140" r="120" stroke="var(--accent-primary)"></circle>
                <circle class="gauge-progress" cx="140" cy="140" r="120" stroke="var(--accent-primary)"></circle>
            </svg>
            <div class="gauge-center">
                <span class="g-label"><%=_("Incoming Speed")%></span>
                <div class="g-value">0.0</div>
                <span class="g-unit">Mbps</span>
            </div>
        </div>

        <!-- Upstream Gauge -->
        <div class="gauge-box" id="gauge-up">
            <svg class="gauge-svg" width="280" height="280" viewBox="0 0 280 280">
                <circle class="gauge-track" cx="140" cy="140" r="120"></circle>
                <circle class="gauge-glow" cx="140" cy="140" r="120" stroke="var(--accent-secondary)"></circle>
                <circle class="gauge-progress" cx="140" cy="140" r="120" stroke="var(--accent-secondary)"></circle>
            </svg>
            <div class="gauge-center">
                <span class="g-label"><%=_("Outgoing Speed")%></span>
                <div class="g-value">0.0</div>
                <span class="g-unit">Mbps</span>
            </div>
        </div>
    </div>

    <div class="stats-container">
        <!-- Traffic Aggregation -->
        <div class="glass-card">
            <div class="card-title"><%=_("Total Traffic")%></div>
            <div class="stat-list">
                <div class="data-row">
                    <span class="data-label"><%=_("Total Download")%></span>
                    <span class="data-val" id="total-rx">0 B</span>
                </div>
                <div class="data-row">
                    <span class="data-label"><%=_("Total Upload")%></span>
                    <span class="data-val" id="total-tx">0 B</span>
                </div>
                <div class="data-row">
                    <span class="data-label">WAN Device</span>
                    <span class="data-val" id="wan-dev">Detecting...</span>
                </div>
            </div>
        </div>

        <!-- Domains Ranking -->
        <div class="glass-card">
            <div class="card-title"><%=_("Top Domains")%></div>
            <div id="domain-list">
                <!-- Dynamic -->
            </div>
        </div>

        <!-- Distribution -->
        <div class="glass-card">
            <div class="card-title"><%=_("Traffic Breakdown")%></div>
            <div id="type-list">
                <!-- Dynamic -->
            </div>
        </div>
    </div>
</div>

<script src="/luci-static/dashboard/dashboard.js"></script>
<%+footer%>
